<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BraiamBank — Turmas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['Fraunces', 'serif'],
          },
          colors: {
            navy: { 900: '#0d1b4b', 800: '#122060', 700: '#1a2c7a' },
            amber: { 400: '#f5a623', 500: '#e8971a' },
          }
        }
      }
    }
  </script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/components/cardTurmas.js"></script>
  <style>
    body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
    #sidebar { transition: width 0.25s ease; }
    #sidebar.closed { width: 0 !important; min-width: 0 !important; padding: 0 !important; border-right: 0 !important; overflow: hidden !important; }
  </style>
</head>

<body class="flex min-h-screen bg-gray-50 font-sans">
  
  

  <!-- MAIN -->
  <div id="main-content" class="flex-1 flex flex-col overflow-auto min-w-0">
    
    <div class="p-8 max-sm:p-5 max-sm:pb-24 flex-1 min-w-0">

      <div id="cardsGrid"
           class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 max-sm:gap-3">
      </div>
    </div>
  </div>


  <script>
    function toggleSidebar() {
      const isMobile = window.innerWidth < 640;
      if (isMobile) {
        document.getElementById('sidebar').classList.toggle('max-sm:hidden');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
      } else {
        document.getElementById('sidebar').classList.toggle('closed');
      }
    }
  </script>
  <script src="../assets/js/pages/turmas.js"></script>
</body>
</html>
