<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>


    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">



    <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl p-8">



        <form class="mb-8">
            <label for="search" class="sr-only">Pesquisar</label>

            <div class="relative">

                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                    </svg>
                </div>

                <input type="search" id="search" placeholder="Pesquisar professor..."
                    class="block w-full p-4 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">

                

            </div>
        </form>


        <!-- Cabeçalho -->
        <div class="flex items-center justify-between mb-8">

            <div>
                <h1 class="text-3xl font-bold text-slate-800">
                    Administrador
                </h1>

                <p class="text-gray-500 mt-1">
                    Lista de Administradores cadastrados.
                </p>
            </div>

            <button class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-3 rounded-lg shadow-md"
                onclick="window.location.href='cadAdmin.html'">
                + Novo Administrador
            </button>

        </div>

        <!-- Tabela -->
        <div class="overflow-x-auto">

            <table class="w-full">

                <thead>

                    <tr class="border-b text-left text-gray-600">
                        <th class="py-4 font-semibold">Id</th>
                        <th class="py-4 font-semibold">Nome</th>
                        <th class="py-4 font-semibold">E-mail</th>
                        <th class="py-4 font-semibold">Status</th>
                        <th class="py-4 font-semibold text-right">Ações</th>
                    </tr>

                </thead>

                <tbody id="tabelaAdmin" class="divide-y divide-gray-200">

                    <tr>
                        <td colspan="5" class="py-8 text-center text-gray-500">
                            Carregando Administradores...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
        <br><br>
        <button onclick="window.location.href='painelAdmin.html'"
            class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-5 py-3 rounded-lg shadow-md">Voltar
        </button>

    </div>

    <!-- IMPORT DO JS EXTERNO -->
    <script src="../assets/js/pages/listAdmin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>


</body>

</html>
