<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BraiamBank — Painel Administrativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['Fraunces', 'serif'],
          },
          colors: {
            navy: { 900: '#0d1b4b', 800: '#122060', 700: '#1a2c7a' },
            amber: { 400: '#f5a623', 500: '#e8971a' },
          }
        }
      }
    }
  </script>

  <style>
    #sidebar {
      transition: width 0.25s ease;
    }

    #sidebar.closed {
      width: 0 !important;
      min-width: 0 !important;
      padding: 0 !important;
      border-right: 0 !important;
      overflow: hidden !important;
    }

    .sub-group {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.28s cubic-bezier(.4, 0, .2, 1);
    }

    .sub-group.open {
      grid-template-rows: 1fr;
    }

    .sub-group>div {
      overflow: hidden;
    }

    .iframe-wrap {
      flex: 1;
      min-height: 0;
    }

    .iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>

<body class="flex min-h-screen bg-gray-50 font-sans">

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="flex w-64 shrink-0 min-w-0 h-screen sticky top-0 bg-white border-r border-gray-200 flex-col p-3 overflow-y-auto max-sm:fixed max-sm:left-0 max-sm:top-0 max-sm:z-40 max-sm:hidden">
    <div class="flex items-center justify-between mb-4 pl-2">
      <img src="../../assets/icons/LogoVetorizado.svg" class="w-10 h-10">
      <button onclick="toggleSidebar()"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition cursor-pointer z-10 shrink-0">
        <svg class="w-5 h-5" viewBox="0 -960 960 960" fill="currentColor">
          <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
        </svg>
      </button>
    </div>

    <a href="#" onclick="carregarPagina('../turmas.html','Listar Turmas'); return false"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
      <img src="../../assets/icons/home.svg" class="w-5 h-5 shrink-0"> Inicio
    </a>

    </div>

    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline"
      href="../pontos.html">
      <img src="../../assets/icons/wallet.svg" class="w-5 h-5 shrink-0"> Pontos
    </a>

    <div class="text-xs text-gray-400 uppercase tracking-wider font-medium px-3 pt-5 pb-2">Gestão</div>

    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline"
      href="#">
      <img src="../../assets/icons/menu.svg" class="w-5 h-5 shrink-0"> Justificativa
    </a>
    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline"
      href="#">
      <img src="../../assets/icons/archive.svg" class="w-5 h-5 shrink-0"> Relatório
    </a>

    <div class="text-xs text-gray-400 uppercase tracking-wider font-medium px-3 pt-5 pb-2">Admin</div>

    <!-- Professores -->
    <div>

      <div
        class="flex items-center justify-between px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition cursor-pointer select-none"
        id="profToggle">
        <div class="flex items-center gap-3">
          <img src="../../assets/icons/professor.svg" class="w-5 h-5 shrink-0"> Professores
        </div>
        <svg class="w-4 h-4 transition-transform duration-200" id="profArrow" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
            clip-rule="evenodd" />
        </svg>
      </div>

      <div class="sub-group " id="profSub">
        <div>
          <a href="#" onclick="carregarPagina('listProf.html','Listar Professores'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Listar</a>
          <a href="#" onclick="carregarPagina('cadProf.html','Criar Professor'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Criar</a>
        </div>
      </div>
    </div>

    <!-- Administradores -->
    <div>
      <div
        class="flex items-center justify-between px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition cursor-pointer select-none"
        id="adminToggle">
        <div class="flex items-center gap-3">
          <img src="../../assets/icons/admin.svg" class="w-5 h-5 shrink-0"> Administradores
        </div>
        <svg class="w-4 h-4 transition-transform duration-200" id="adminArrow" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <div class="sub-group " id="adminSub">
        <div>
          <a href="#" onclick="carregarPagina('listAdmin.html','Listar Administradores'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Listar</a>
          <a href="#" onclick="carregarPagina('cadAdmin.html','Criar Administrador'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Criar</a>
        </div>
      </div>
    </div>

    <!-- Turmas -->
    <div>
      <div
        class="flex items-center justify-between px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition cursor-pointer select-none"
        id="turmaToggle">
        <div class="flex items-center gap-3">
          <img src="../../assets/icons/turma.svg" class="w-5 h-5 shrink-0"> Turmas
        </div>
        <svg class="w-4 h-4 transition-transform duration-200" id="turmaArrow" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <div class="sub-group " id="turmaSub">
        <div>
          <a href="#" onclick="carregarPagina('listTurma.html','Listar Turmas'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Listar</a>
          <a href="#" onclick="carregarPagina('cadTurma.html','Criar Turma'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Criar</a>
        </div>
      </div>
    </div>

    <!-- Disciplinas -->
    <div>
      <div
        class="flex items-center justify-between px-3 py-2 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition cursor-pointer select-none"
        id="discToggle">
        <div class="flex items-center gap-3">
          <img src="../../assets/icons/disciplina.svg" class="w-5 h-5 shrink-0"> Disciplinas
        </div>
        <svg class="w-4 h-4 transition-transform duration-200" id="discArrow" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <div class="sub-group " id="discSub">
        <div>
          <a href="#" onclick="carregarPagina('listDisciplina.html','Listar Disciplinas'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Listar</a>
          <a href="#" onclick="carregarPagina('cadDisciplina.html','Criar Disciplina'); return false"
            class="flex items-center gap-3 px-3 py-1.5 ml-7 rounded-md text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
            Criar</a>
        </div>
      </div>
    </div>

    <a href="#" onclick="carregarPagina('logs.html','Logs do sistema'); return false"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline">
      <img src="../../assets/icons/logs.svg" class="w-5 h-5 shrink-0"> Logs do sistema
    </a>

    <div class="mt-auto pt-3 border-t border-gray-100">
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition no-underline"
        href="#">
        <img src="../../assets/icons/exit.svg" class="w-5 h-5 shrink-0"> Sair
      </a>
    </div>
  </aside>

  <!-- overlay for mobile -->
  <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/30 z-30 hidden"></div>

  <!-- MAIN -->
  <div id="main-content" class="flex-1 flex flex-col min-w-0 h-screen">
    <div class="h-12 bg-white border-b border-gray-200 flex items-center gap-3 px-4 shrink-0">
      <button id="sidebarOpenBtn" onclick="toggleSidebar()"
        class="w-8 h-8 hidden items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition cursor-pointer max-sm:flex">
        <svg class="w-5 h-5" viewBox="0 -960 960 960" fill="currentColor">
          <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
        </svg>
      </button>
      <span class="text-gray-400 text-sm">Admin</span>
      <span class="text-gray-300">/</span>
      <span id="pageTitle" class="text-navy-900 text-sm font-semibold">Painel Administrativo</span>
    </div>

    <div class="iframe-wrap p-6">
      <iframe id="contentFrame" src="about:blank"></iframe>
    </div>
  </div>


  <script>


    let sidebarOpen = true;

    function toggleSidebar() {
      const isMobile = window.innerWidth < 640;
      if (isMobile) {
        document.getElementById('sidebar').classList.toggle('max-sm:hidden');
        document.getElementById('sidebarOverlay').classList.toggle('hidden');
      } else {
        sidebarOpen = !sidebarOpen;
        document.getElementById('sidebar').classList.toggle('closed');
        document.getElementById('sidebarOpenBtn').classList.toggle('hidden');
      }
    }

    function toggleGroup(toggleId, subId, arrowId) {
      const toggle = document.getElementById(toggleId);
      const sub = document.getElementById(subId);
      const arrow = document.getElementById(arrowId);

      toggle.addEventListener('click', () => {
        sub.classList.toggle('open');
        arrow.style.transform = sub.classList.contains('open') ? 'rotate(0deg)' : 'rotate(-90deg)';
      });
    }

    toggleGroup('profToggle', 'profSub', 'profArrow');
    toggleGroup('adminToggle', 'adminSub', 'adminArrow');
    toggleGroup('turmaToggle', 'turmaSub', 'turmaArrow');
    toggleGroup('discToggle', 'discSub', 'discArrow');

    function carregarPagina(url, titulo) {
      document.getElementById('contentFrame').src = url;
      document.getElementById('pageTitle').textContent = titulo;
      currentPage = {url, titulo};
      localStorage.setItem('currentPage', JSON.stringify(currentPage));
    }

    let currentPage = JSON.parse(localStorage.getItem('currentPage')) || null;
    setTimeout(() => carregarPagina(currentPage ? currentPage.url : "../turmas.html", currentPage ? currentPage.titulo : "Listar Turmas"), 100);
  </script>
</body>

</html>
