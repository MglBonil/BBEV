<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }

        @media (max-width: 480px) {
            .form-card {
                padding: 20px 16px !important;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 form-card">

        <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">
            Cadastro de Aluno
        </h1>

        <form id="formAluno" class="space-y-5">

            <!-- RM -->
            <div class="relative">
                <input id="rmAluno" type="text" required placeholder=" " class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2
                    focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    RM do Aluno
                </label>
            </div>

            <!-- Nome -->
            <div class="relative">
                <input id="nomeAluno" type="text" required placeholder=" " class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2
                    focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    Nome do Aluno
                </label>
            </div>

            <!-- Email -->
            <div class="relative">
                <input id="emailAluno" type="email" required placeholder=" " class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2
                    focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    Email do Aluno
                </label>
            </div>

            <!-- DataNasc -->
            <div class="relative">
                <input id="dataNascAluno" type="date" required placeholder=" " class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2
                    focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    Data de Nascimento
                </label>
            </div>

            <!-- Turma -->
            <div class="relative">

                <select id="codTurma" required
                    class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 bg-white
                    focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <option value="" disabled selected>Selecione a turma</option>

                </select>

                

            </div>

            <!-- BOTÕES -->
            <div class="flex flex-col gap-3 pt-2">

                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md">
                    Cadastrar
                </button>

                <button type="button" onclick="window.location.href='listAluno.html'"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg">
                    Cancelar
                </button>

            </div>

        </form>

    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/pages/cadAluno.js"></script>

</body>

</html>
