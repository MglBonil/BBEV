<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        display: ['Fraunces', 'serif'],
                    },
                    colors: {
                        navy: {
                            900: '#0d1b4b', 800: '#122060', 700: '#1a2c7a'
                        },
                        amber: {
                            400: '#f5a623', 500: '#e8971a'
                        },
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl p-6 sm:p-8 list-card">

        <form class="mb-6">
            <label for="search" class="sr-only">Pesquisar</label>

            <div class="relative">

                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />      
                    </svg>
                </div>

                <input type="search" id="search" placeholder="     Pesquisar log..."
                    class="block w-full p-3 sm:p-4 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">

            </div>
        </form>

        <!-- Cabeçalho -->
        <div class="flex items-center justify-between mb-6 list-header">

            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 list-title">
                    Logs do sistema
                </h1>

                <p class="text-gray-500 mt-1 text-sm">
                    Lista de logs do sistema.
                </p>
            </div>

        </div>

        <!-- Tabela -->
        <div class="overflow-x-auto">

            <table class="w-full text-sm sm:text-base">

                <thead>

                    <tr class="border-b text-left text-gray-600">
                        <th class="py-3 sm:py-4 font-semibold text-center">ID</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Autor</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Cargo</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Tabela</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Operação</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Data e Hora</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Descrição</th>
                    </tr>

                </thead>

                <tbody id="tabelaLogs" class="divide-y divide-gray-200">

                    <tr>
                        <td colspan="8" class="py-8 text-center text-gray-500">
                            Carregando logs do sistema...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
        <br>
        

    </div>


    <!-- IMPORT DO JS EXTERNO -->
    <script src="../../assets/js/pages/listLogs.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>


</body>

</html>
