<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Administrador</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
        @media (max-width: 480px) {
            .form-card { padding: 20px 16px !important; }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 form-card">

        <h1 class="text-3xl font-bold text-center text-slate-800 mb-6">
            Editar Administrador
        </h1>

        <form id="formAdmin" class="space-y-5">

            <!-- ID (somente leitura) -->
            <div class="relative">
                <input id="idAdm" type="text" readonly placeholder=" "
                    class="peer w-full border border-gray-200 bg-gray-100 rounded-lg px-4 pt-5 pb-2 text-gray-500 focus:outline-none">

                <label class="absolute left-4 top-2 text-gray-500 text-sm">
                    ID do Administrador
                </label>
            </div>

            <!-- Nome -->
            <div class="relative">
                <input id="nomeAdmin" type="text" required placeholder=" "
                    class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    Nome do Administrador
                </label>
            </div>

            <!-- Email -->
            <div class="relative">
                <input id="emailAdmin" type="email" required placeholder=" "
                    class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    E-mail Institucional
                </label>
            </div>

            <!-- Status -->
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" id="statusAtivo" name="statusAdmin" value="true"
                    class="w-4 h-4 text-blue-600 focus:ring-blue-500">

                <span>Ativo</span>
                
                <input type="radio" id="statusInativo" name="statusAdmin" value="false"
                    class="w-4 h-4 text-blue-600 focus:ring-blue-500">

                <span>Inativo</span>
            </label>

            <!-- Senha -->
            <div class="relative">

                <input id="senhaAdmin" type="password" placeholder=" "
                    class="peer w-full border border-gray-300 rounded-lg px-4 pt-5 pb-2 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500">

                <label class="absolute left-4 top-2 text-gray-500 text-sm transition-all
                    peer-placeholder-shown:top-3.5
                    peer-placeholder-shown:text-base
                    peer-focus:top-2
                    peer-focus:text-sm">

                    Senha
                </label>

                <button type="button" onclick="toggleSenha()" class="absolute right-3 top-3">

                    <img id="iconeSenha" src="../../assets/icons/visibility.svg" class="w-5 h-5">

                </button>

            </div>

            <div class="flex flex-col gap-3">

                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg">

                    Salvar Alterações

                </button>

                <button type="button" id="btnExcluir"
                   class="bg-red-600 hover:bg-red-700 text-gray-200 font-semibold py-3 rounded-lg">
                   Excluir Administrador
                </button>

                <button type="button" onclick="window.location.href='listAdmin.html'"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg">
                    Cancelar
                </button>

            </div>

        </form>

    </div>

    <script src="../../assets/js/config.js"></script>
    <script type="module" src="../../assets/js/pages/editAdmin.js"></script>

    <script>

        const campo = document.getElementById("senhaAdmin");

        let valorOriginal = campo.value;

        campo.addEventListener("focus", function () {
            valorOriginal = this.value; // Salva o valor atual
            this.value = "";            // Limpa ao clicar
        });

        campo.addEventListener("blur", function () {
            if (this.value.trim() === "    ") {
                this.value = valorOriginal; // Restaura se não digitou nada
            }
        });

        function toggleSenha() {

            const senha = document.getElementById("senhaAdmin");
            const icone = document.getElementById("iconeSenha");

            if (senha.type === "password") {

                senha.type = "text";
                icone.src = "../../assets/icons/visibility_off.svg";

            } else {

                senha.type = "password";
                icone.src = "../../assets/icons/visibility.svg";

            }

        }

    </script>

</body>

</html>
