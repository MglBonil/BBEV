<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disciplinas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>


    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
        @media (max-width: 640px) {
            .list-card { padding: 16px !important; }
            .list-title { font-size: 1.5rem !important; }
            .list-header { flex-direction: column; gap: 12px; align-items: stretch !important; }
            .list-header a, .list-header button { width: 100%; text-align: center; }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

    <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl p-6 sm:p-8 list-card">

        <form class="mb-6">
            <label for="search" class="sr-only">Pesquisar</label>

            <div class="relative">

                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 20 20">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                    </svg>
                </div>

                <input type="search" id="search" placeholder="     Pesquisar Disciplina..."
                    class="block w-full p-3 sm:p-4 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">

            </div>
        </form>

        <!-- Cabeçalho -->
        <div class="flex items-center justify-between mb-6 list-header">

            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 list-title">
                    Disciplinas
                </h1>

                <p class="text-gray-500 mt-1 text-sm">
                    Lista de disciplinas cadastradas.
                </p>
            </div>

            <a href="cadDisciplina.html"
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-3 rounded-lg shadow-md inline-block text-center whitespace-nowrap">
                + Nova Disciplina
            </a>

        </div>

        <!-- Tabela -->
        <div class="overflow-x-auto">

            <table class="w-full text-sm sm:text-base">

                <thead>

                    <tr class="border-b text-left text-gray-600">
                        <th class="py-3 sm:py-4 font-semibold text-center">ID</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Nome</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Professor</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Turma</th>
                        <th class="py-3 sm:py-4 font-semibold text-center">Ações</th>
                    </tr>

                </thead>

                <tbody id="tabelaDisciplinas" class="divide-y divide-gray-200">

                    <tr>
                        <td colspan="8" class="py-8 text-center text-gray-500">
                            Carregando disciplinas...
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
        <br>
        

    </div>
    

    <!-- IMPORT DO JS EXTERNO -->
    <script src="../../assets/js/pages/listDisciplina.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>


</body>

</html>
